services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diaspora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: diaspora
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - diaspora_pg:/var/lib/postgresql/data

volumes:
  diaspora_pg:
